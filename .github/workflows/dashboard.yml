name: Build & publish solar dashboard

# GitHub throttles frequent `schedule` crons heavily (it often fires only every
# ~2h). So instead of relying on the scheduler for cadence, a single run LOOPS
# internally — rebuilding and republishing every ~15 minutes — and deploys by
# pushing the encrypted page to the `gh-pages` branch (served by GitHub Pages).
# The schedule/dispatch just (re)starts the loop if it ever stops. The
# concurrency group guarantees only one loop is ever running.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [refresh]
  push:
    branches: [main]

permissions:
  contents: write          # push the built site to the gh-pages branch

concurrency:
  group: solar-dashboard
  cancel-in-progress: true # a newer run replaces the looping one (single loop)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 335    # loop exits at ~5h; safely under the 6h hard cap
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build, encrypt and publish every ~15 minutes
        env:
          FUSIONSOLAR_USER: ${{ secrets.FUSIONSOLAR_USER }}
          FUSIONSOLAR_PASSWORD: ${{ secrets.FUSIONSOLAR_PASSWORD }}
          NETECO_USER: ${{ secrets.NETECO_USER }}
          NETECO_PASSWORD: ${{ secrets.NETECO_PASSWORD }}
          SOLARMAN_TOKEN: ${{ secrets.SOLARMAN_TOKEN }}
          STATICRYPT_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          GH_TOKEN: ${{ github.token }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          REPO="https://x-access-token:${GH_TOKEN}@github.com/${REPO_SLUG}.git"
          END=$(( $(date +%s) + 18000 ))   # loop for ~5h, then exit (gets restarted)
          n=0
          while [ "$(date +%s)" -lt "$END" ]; do
            START=$(date +%s); n=$((n+1))
            # Pull the latest main each cycle so tariff edits (config/prices.json)
            # and code changes are picked up within one cycle without a restart.
            git fetch -q origin main 2>/dev/null && git reset --hard -q origin/main 2>/dev/null || echo "main sync skipped"
            echo "::group::cycle $n  $(date -u +%FT%TZ)"
            (
              set -e
              python build_dashboard.py
              rm -rf build site && mkdir -p build
              cp output/dashboard.html build/index.html
              npx -y staticrypt@3 build/index.html --short \
                --salt 9d90a60f8bcf475e741e4bd5b63c41b0 --remember 30 \
                --template-title "Сонячний парк Brenvel" \
                --template-instructions "Введіть пароль команди, щоб переглянути панель сонячних станцій." \
                --template-color-primary "#16a34a" \
                --template-button "Переглянути панель" \
                --template-placeholder "Пароль" \
                --template-remember "Запам'ятати мене" \
                --template-error "Невірний пароль" \
                -d site
              test -f site/index.html
              touch site/.nojekyll
              cd site
              git init -q
              git checkout -q -b gh-pages
              git add -A
              git -c user.email=actions@github.com -c user.name="solar-bot" commit -q -m "update $(date -u +%FT%TZ)"
              git push -q -f "$REPO" gh-pages
            ) && echo "published cycle $n" || echo "cycle $n failed; previous version kept live"
            echo "::endgroup::"
            EL=$(( $(date +%s) - START )); S=$(( 900 - EL )); [ "$S" -lt 30 ] && S=30
            echo "next cycle in ${S}s"; sleep "$S"
          done
          echo "loop window elapsed; exiting (schedule/dispatch will restart it)"
