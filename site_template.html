<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Сонячний парк Brenvel</title>
<style>
  :root{--bg:#eef2f6;--card:#fff;--ink:#0f172a;--muted:#64748b;--faint:#94a3b8;--line:#e7edf3;
    --green:#16a34a;--blue:#2563eb;--amber:#f59e0b;--red:#ef4444;--slate:#64748b;--cyan:#0ea5e9;--violet:#8b5cf6;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1720px;margin:0 auto;padding:0 28px 48px}
  header{position:sticky;top:0;z-index:20;background:rgba(238,242,246,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .bar{max-width:1720px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{font-size:19px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:9px;white-space:nowrap}
  nav{display:flex;gap:4px;flex-wrap:wrap;flex:1}
  .tab{border:0;background:transparent;color:var(--muted);font:inherit;font-size:14px;font-weight:600;padding:8px 14px;border-radius:9px;cursor:pointer;white-space:nowrap}
  .tab:hover{background:#e2e8f0;color:var(--ink)}
  .tab.active{background:var(--ink);color:#fff}
  .meta{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12.5px;white-space:nowrap}
  .live{display:inline-flex;align-items:center;gap:6px;background:#dcfce7;color:#15803d;font-weight:700;font-size:11px;padding:5px 10px;border-radius:999px}
  .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:p 1.6s infinite}
  @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
  /* range selector */
  .rangebar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:10px 12px;margin:22px 0}
  .rb{border:1px solid var(--line);background:#fff;color:var(--muted);font:inherit;font-size:13px;font-weight:600;
    padding:7px 13px;border-radius:9px;cursor:pointer}
  .rb:hover{background:#f1f5f9;color:var(--ink)}
  .rb.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .rangebar .sep{width:1px;height:24px;background:var(--line);margin:0 4px}
  .rangebar input[type=date]{border:1px solid var(--line);border-radius:9px;padding:6px 9px;font:inherit;font-size:13px;color:var(--ink)}
  .rangebar .lbl{font-size:12px;color:var(--faint);font-weight:600}
  /* kpis */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px;margin:18px 0}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:16px 18px}
  .kpi .k{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .kpi .v{font-size:24px;font-weight:800;margin-top:7px;letter-spacing:-.6px;line-height:1.05}
  .kpi .u{font-size:13px;color:var(--faint);font-weight:700}
  .kpi .s{font-size:12px;color:var(--muted);margin-top:5px}
  .kpi.accent{background:#f0fdf4;border-color:#bbf7d0}
  .alert{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:13px;padding:13px 18px;font-size:14px;font-weight:500;margin:0 0 18px;display:flex;gap:10px;align-items:center}
  .note{background:#f1f5f9;border:1px solid var(--line);color:var(--muted);border-radius:12px;padding:11px 16px;font-size:13px;margin:14px 0}
  h2.sec{font-size:15px;font-weight:800;letter-spacing:-.2px;margin:30px 0 14px;color:#334155}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px}
  .panel h3{margin:0 0 4px;font-size:15px;font-weight:700}
  .panel .sub{color:var(--faint);font-size:12.5px;margin-bottom:14px}
  .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:18px}
  .full{grid-column:1/-1}
  .cwrap{position:relative;width:100%;height:300px}
  .cwrap.tall{height:340px}
  .cwrap.sm{height:240px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .scard{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:18px;cursor:pointer;border-top:4px solid var(--slate);transition:transform .12s,box-shadow .12s}
  .scard:hover{transform:translateY(-3px);box-shadow:0 12px 28px -14px rgba(15,23,42,.28)}
  .scard .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .scard .nm{font-weight:700;font-size:15.5px}
  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;color:#fff;white-space:nowrap}
  .scard .now{font-size:24px;font-weight:800;margin:12px 0 0;letter-spacing:-.8px}
  .scard .now u{font-size:13px;color:var(--faint);font-weight:700;font-style:normal}
  .mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 10px;margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .mini .x small{font-size:9.5px;color:var(--faint);font-weight:700}
  .spark{height:62px;position:relative;margin-top:12px}
  .spark .nospark{height:100%;display:flex;align-items:center;justify-content:center;color:#cbd5e1;font-size:11.5px;font-weight:600}
  .mini .l{font-size:9.5px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .mini .x{font-size:12.5px;font-weight:700;margin-top:2px}
  .dhead{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;align-items:flex-start;margin:22px 0 4px}
  .dhead .h1{font-size:25px;font-weight:800;letter-spacing:-.6px;display:flex;align-items:center;gap:12px}
  .dhead .addr{color:var(--muted);font-size:13.5px;margin-top:6px;max-width:560px}
  .pill{display:inline-flex;gap:6px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--muted)}
  .ok{color:var(--green);font-weight:700}
  .foot{text-align:center;color:var(--faint);font-size:12px;margin-top:34px}
  .curtog{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .cbtn{border:0;background:transparent;color:var(--muted);font:inherit;font-size:13px;font-weight:800;padding:5px 11px;cursor:pointer}
  .cbtn.on{background:var(--ink);color:#fff}
  .fxnote{font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap;background:#fff;border:1px solid var(--line);border-radius:9px;padding:5px 10px}
  .prices{margin:26px 0 6px;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .prices>summary{cursor:pointer;padding:14px 18px;font-weight:700;font-size:14px;color:#334155;list-style:none;user-select:none;display:flex;align-items:center;gap:8px}
  .prices>summary::-webkit-details-marker{display:none}
  .prices>summary::after{content:'▾';margin-left:auto;color:var(--faint);transition:transform .15s}
  .prices[open]>summary::after{transform:rotate(180deg)}
  .prices>summary:hover{background:#f8fafc}
  .prices .pbody{padding:6px 18px 18px;border-top:1px solid var(--line)}
  .prices .prow{display:flex;align-items:center;gap:10px;margin:14px 0 6px}
  .prices label{font-size:13px;font-weight:600;color:var(--muted)}
  .ptbl{width:100%;border-collapse:collapse;font-size:13px}
  .ptbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;padding:6px 8px;border-bottom:1px solid var(--line)}
  .ptbl td{padding:8px;border-bottom:1px solid var(--line);vertical-align:middle;white-space:nowrap}
  .ptbl .pn{font-weight:600;white-space:normal}
  .ptbl .pd{color:var(--muted);font-size:12px}
  .ptbl .pdh{font-size:9.5px;color:var(--faint)}
  .ptbl input{width:84px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;font:inherit;font-size:13px}
  .pacts{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
  .phint{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.55}
  @media(max-width:640px){
    .ptbl .pd,.ptbl .thd{display:none}
    .ptbl th,.ptbl td{padding:7px 5px}
    .ptbl input{width:70px}
    .wrap{padding:0 14px 40px}
    .bar{padding:12px 14px;gap:10px}
    .charts{grid-template-columns:1fr}
    .cwrap{height:240px} .cwrap.tall{height:260px} .cwrap.sm{height:220px}
    .kpis{grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0}
    .kpi{padding:13px 13px;border-radius:13px}
    .kpi .v{font-size:20px} .kpi .k{font-size:10px}
    .cards{grid-template-columns:1fr}
    .scard{padding:16px}
    .rb{padding:6px 11px;font-size:12.5px}
    .rangebar{padding:9px 10px;gap:6px;margin:16px 0}
    .rangebar input[type=date]{padding:5px 7px;font-size:12.5px}
    .dhead .h1{font-size:21px} h2.sec{margin:22px 0 12px}
    .panel{padding:16px}
  }
</style>
</head>
<body>
<header><div class="bar">
  <div class="brand">☀️ Сонячний парк Brenvel</div>
  <nav id="nav"></nav>
  <div class="meta"><span class="curtog" id="curtog"><button class="cbtn on" data-c="€" onclick="setCur('€')">€</button><button class="cbtn" data-c="₴" onclick="setCur('₴')">₴</button></span><span class="fxnote" id="fxnote" title="Поточний курс, за яким рахується дохід у гривні"></span><span id="upd"></span><span class="live"><span class="dot"></span>НАЖИВО</span></div>
</div></header>
<div class="wrap"><div id="view"></div><div class="foot" id="foot"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DATA=__DATA__, S=DATA.stations, TODAY=DATA.updated.slice(0,10);
const ST={connected:['#16a34a','Онлайн'],disconnected:['#94a3b8','Офлайн'],trouble:['#f59e0b','Попередження'],unknown:['#94a3b8','Невідомо']};
const COLORS=['#16a34a','#2563eb','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#ec4899','#f97316'];
const C={pv:'#16a34a',load:'#475569',selfuse:'#16a34a',export:'#f59e0b',imp:'#ef4444',rev:'#0ea5e9'};
const fmt=(n,d=0)=>(n==null||isNaN(n))?'–':Number(n).toLocaleString('uk-UA',{minimumFractionDigits:d,maximumFractionDigits:d});
const short=n=>n.replace('Brenvel_','').replace('Brenvei_','');
const nm=s=>s.display||s.name;   // custom display name (falls back to the stable id s.name)
const stCol=s=>(ST[s]||ST.unknown)[0], stLbl=s=>(ST[s]||ST.unknown)[1];
const cap=s=>s.nominal_kw>0?fmt(s.nominal_kw)+' кВт':'—';
const noHist=s=>!(s.daily&&s.daily.length);  // NetEco/Photomate: live snapshot only
const hasRev=s=>(s.daily||[]).some(d=>d.rev!=null);  // NetEco history has generation, no per-period revenue
let charts=[]; const clearCharts=()=>{charts.forEach(c=>c.destroy());charts=[];};
let RANGE={key:'30d'}, curView=-1;

/* ---------- date range ---------- */
const isoAgo=n=>{const d=new Date(TODAY);d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);};
const monAgo=n=>{const d=new Date(TODAY);d.setMonth(d.getMonth()-n);return d.toISOString().slice(0,7);};
const RPRESETS=[['today','Сьогодні'],['7d','7 днів'],['30d','30 днів'],['month','Цей місяць'],['90d','90 днів'],['year','Цей рік'],['12m','12 місяців'],['all','Весь час']];
function resolveRange(){
  const k=RANGE.key, end=TODAY;
  if(k==='today')  return {gran:'daily', from:end, to:end, title:'сьогодні'};
  if(k==='7d')     return {gran:'daily', from:isoAgo(6),  to:end, title:'останні 7 днів'};
  if(k==='30d')    return {gran:'daily', from:isoAgo(29), to:end, title:'останні 30 днів'};
  if(k==='90d')    return {gran:'daily', from:isoAgo(89), to:end, title:'останні 90 днів'};
  if(k==='month')  return {gran:'daily', from:TODAY.slice(0,7)+'-01', to:end, title:'цей місяць'};
  if(k==='year')   return {gran:'monthly', from:TODAY.slice(0,4)+'-01', to:TODAY.slice(0,7), title:'цей рік'};
  if(k==='12m')    return {gran:'monthly', from:monAgo(11), to:TODAY.slice(0,7), title:'останні 12 місяців'};
  if(k==='all')    return {gran:'yearly', title:'весь час'};
  if(k==='custom'){const sp=(new Date(RANGE.to)-new Date(RANGE.from))/864e5;
    return {gran: sp<=400?'daily':'monthly', from:RANGE.from, to:(sp<=400?RANGE.to:RANGE.to.slice(0,7)), title:RANGE.from+' – '+RANGE.to};}
}
function setRange(k){RANGE.key=k; rerender();}
function applyCustom(){const f=document.getElementById('rfrom').value,t=document.getElementById('rto').value;
  if(f&&t){RANGE={key:'custom',from:f,to:t}; rerender();}}
function rerender(){window.scrollTo({top:document.getElementById('view').offsetTop-70,behavior:'instant'}); curView<0?overview():station(curView);}
function rangeBar(){
  return `<div class="rangebar">${RPRESETS.map(([k,l])=>`<button class="rb ${RANGE.key===k?'on':''}" onclick="setRange('${k}')">${l}</button>`).join('')}
    <span class="sep"></span><span class="lbl">або</span>
    <input type="date" id="rfrom" max="${TODAY}" value="${RANGE.from||isoAgo(29)}">
    <span class="lbl">–</span>
    <input type="date" id="rto" max="${TODAY}" value="${RANGE.to||TODAY}">
    <button class="rb ${RANGE.key==='custom'?'on':''}" onclick="applyCustom()">Застосувати</button></div>`;
}
function pick(rec,gran){return gran==='monthly'?rec.monthly:gran==='yearly'?rec.yearly:rec.daily;}
function agg(rec,R){
  let data=(pick(rec,R.gran)||[]).slice();
  if(R.from) data=data.filter(r=>r.label>=R.from && r.label<=R.to);
  const tot={pv:0,load:0,selfuse:0,export:0,imp:0,rev:0}; let has={};
  data.forEach(r=>{for(const k in tot){if(r[k]!=null){tot[k]+=r[k];has[k]=1;}}});
  for(const k in tot) if(!has[k]) tot[k]=null;
  return {data,tot};
}
const lbl=(s,gran)=>gran==='daily'?s.slice(5):s;

/* ---------- chart helpers ---------- */
function kpi(k,v,u,s,acc){return `<div class="kpi${acc?' accent':''}"><div class="k">${k}</div><div class="v">${v}${u?` <span class="u">${u}</span>`:''}</div>${s?`<div class="s">${s}</div>`:''}</div>`;}
function eScale(k){k=k||0; if(k>=1e6)return{v:fmt(k/1e6,1),u:'ГВт·год'}; if(k>=1e3)return{v:fmt(k/1e3,1),u:'МВт·год'}; return{v:fmt(k),u:'кВт·год'};}
function cardE(k){const e=eScale(k); return `${e.v} <small>${e.u.replace('год','г')}</small>`;}
let CUR='€'; let FX=+(DATA.fx)||42;
const REPO=DATA.repo||'tantisch/brenvel-solar-dashboard';
let PRICES_OPEN=false;
/* income for pvKwh (with known EUR revenue) for a station, in the active currency */
function incomeOf(s,pvKwh,eurRev){
  pvKwh=pvKwh||0; const p=(s&&s.pr)||{};
  const eur=(p.custom&&p.eur>0)?pvKwh*p.eur/1000:(eurRev||0);  // € from your price or system
  return CUR==='₴'?eur*FX:eur;                                  // ₴ = € × rate
}
function money(v){v=v||0; return CUR+(v>=1e6?fmt(v/1e6,2)+' млн':fmt(v));}
function inc(r){return `<b style="color:#15803d;font-weight:800;font-size:14px">${money(r)}</b> <span style="color:#94a3b8">дохід</span>`;}
function setCur(c){if(c===CUR)return; CUR=c; document.querySelectorAll('#curtog .cbtn').forEach(b=>b.classList.toggle('on',b.dataset.c===c)); rerender();}
const axMoney=v=>v>=1000?(v/1000)+'к':v;
function bars(id,labels,sets,unit='кВт·год',stacked=false){
  const ctx=document.getElementById(id); if(!ctx)return;
  charts.push(new Chart(ctx,{type:'bar',data:{labels,datasets:sets.map(d=>({label:d.l,data:d.d,backgroundColor:d.c,borderRadius:4,maxBarThickness:34,stack:stacked?'s':undefined}))},
    options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
      plugins:{legend:{display:sets.length>1,position:'bottom',labels:{boxWidth:10,boxHeight:10,usePointStyle:true,font:{size:11},color:'#64748b'}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.parsed.y,0)} ${unit}`}}},
      scales:{x:{stacked,grid:{display:false},ticks:{maxTicksLimit:14,color:'#94a3b8',font:{size:10}}},
        y:{stacked,beginAtZero:true,grid:{color:'#eef2f6'},ticks:{color:'#94a3b8',font:{size:11},callback:axMoney}}}}}));
}
function donut(id,labels,data,cols,unit='кВт·год'){
  const ctx=document.getElementById(id); if(!ctx)return;
  charts.push(new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:cols,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,boxHeight:10,usePointStyle:true,font:{size:12},color:'#475569'}},
        tooltip:{callbacks:{label:c=>{const t=c.dataset.data.reduce((a,b)=>a+b,0); return ` ${c.label}: ${fmt(c.parsed,0)} ${unit} (${t?Math.round(c.parsed/t*100):0}%)`;}}}}}}));
}
function line(id,labels,data,color){
  const ctx=document.getElementById(id); if(!ctx)return;
  charts.push(new Chart(ctx,{type:'line',data:{labels,datasets:[{data,borderColor:color,backgroundColor:color+'22',borderWidth:2,fill:true,tension:.35,pointRadius:0,pointHoverRadius:4,spanGaps:false}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${fmt(c.parsed.y,1)} кВт`}}},
      scales:{x:{grid:{display:false},ticks:{maxTicksLimit:9,color:'#94a3b8',font:{size:11}}},
        y:{beginAtZero:true,grid:{color:'#eef2f6'},ticks:{color:'#94a3b8',font:{size:11},callback:v=>v+' кВт'}}}}}));
}
function lines(id,labels,sets){
  const ctx=document.getElementById(id); if(!ctx)return;
  charts.push(new Chart(ctx,{type:'line',data:{labels,datasets:sets.map(s=>({label:s.l,data:s.d,borderColor:s.c,
    backgroundColor:s.c+'18',borderWidth:2,fill:true,tension:.35,pointRadius:0,pointHoverRadius:4,spanGaps:false}))},
    options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,boxHeight:10,usePointStyle:true,font:{size:12},color:'#475569'}},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.parsed.y,1)} кВт`}}},
      scales:{x:{grid:{display:false},ticks:{maxTicksLimit:9,color:'#94a3b8',font:{size:11}}},
        y:{beginAtZero:true,grid:{color:'#eef2f6'},ticks:{color:'#94a3b8',font:{size:11},callback:v=>v+' кВт'}}}}}));
}

/* ---------- OVERVIEW ---------- */
function sparkline(id,labels,data,color){
  const ctx=document.getElementById(id); if(!ctx)return;
  const peak=Math.max(0,...data.filter(x=>x!=null));
  charts.push(new Chart(ctx,{type:'line',data:{labels,datasets:[{data,borderColor:color,
    backgroundColor:color+'1f',borderWidth:1.6,fill:true,tension:.4,pointRadius:0,pointHoverRadius:3,spanGaps:false}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{intersect:false,mode:'index'},
      plugins:{legend:{display:false},tooltip:{displayColors:false,callbacks:{title:c=>c[0].label,label:c=>` ${fmt(c.parsed.y,1)} кВт`}}},
      scales:{x:{display:false},y:{display:false,beginAtZero:true,suggestedMax:peak*1.1||1}}}}));
}
function overview(){
  clearCharts();
  const R=resolveRange();
  const TM=TODAY.slice(0,7), TY=TODAY.slice(0,4);
  const fM=(s,l)=>(s.monthly||[]).find(x=>x.label===l);
  const fY=(s,l)=>(s.yearly||[]).find(x=>x.label===l);
  const tRev=s=>s.today_rev!=null?s.today_rev:((s.daily||[]).find(d=>d.label===TODAY)?.rev||0);
  const sumY=(s,k)=>(s.yearly||[]).reduce((a,y)=>a+(y[k]||0),0);
  const T={now:S.reduce((a,s)=>a+s.now_kw,0),
    pvD:S.reduce((a,s)=>a+((s.today&&s.today.pv)||0),0), revD:S.reduce((a,s)=>a+incomeOf(s,(s.today&&s.today.pv)||0,tRev(s)),0),
    pvM:S.reduce((a,s)=>a+(fM(s,TM)?.pv||0),0),          revM:S.reduce((a,s)=>a+incomeOf(s,fM(s,TM)?.pv||0,fM(s,TM)?.rev||0),0),
    pvY:S.reduce((a,s)=>a+(fY(s,TY)?.pv||0),0),          revY:S.reduce((a,s)=>a+incomeOf(s,fY(s,TY)?.pv||0,fY(s,TY)?.rev||0),0),
    pvL:S.reduce((a,s)=>a+sumY(s,'pv'),0),               revL:S.reduce((a,s)=>a+incomeOf(s,sumY(s,'pv'),sumY(s,'rev')),0)};
  const online=S.filter(s=>s.status==='connected').length;
  const probs=S.filter(s=>s.status!=='connected');
  const eM=eScale(T.pvM), eY=eScale(T.pvY), eL=eScale(T.pvL);
  const v=document.getElementById('view');
  v.innerHTML=`
    ${probs.length?`<div class="alert">⚠️ <b>Потребують уваги (${probs.length}):</b> ${probs.map(p=>short(nm(p))+' ('+stLbl(p.status).toLowerCase()+')').join(', ')}</div>`:''}
    <div class="kpis">
      ${kpi('Поточна потужність',fmt(T.now,1),'кВт','по '+S.length+' станціях')}
      ${kpi('Енергія сьогодні',fmt(T.pvD),'кВт·год',inc(T.revD),1)}
      ${kpi('Цей місяць',eM.v,eM.u,inc(T.revM))}
      ${kpi('Цей рік',eY.v,eY.u,inc(T.revY))}
      ${kpi('За весь час',eL.v,eL.u,inc(T.revL))}
      ${kpi('Станцій онлайн',online+' / '+S.length,'',probs.length?'⚠ '+probs.length+' потребують уваги':'усі справні')}
    </div>
    <h2 class="sec">Усі станції <span style="font-weight:600;font-size:12px;color:#94a3b8">· генерація сьогодні наживо</span></h2>
    <div class="cards">${S.map((s,i)=>scard(s,i)).join('')}</div>
    <h2 class="sec">Генерація по станціях — ${R.title} <span style="font-weight:600;font-size:12px;color:#94a3b8">· натисніть станцію в легенді, щоб приховати/показати</span></h2>
    ${rangeBar()}
    <div class="panel"><div class="cwrap tall"><canvas id="oGen"></canvas></div></div>
    ${pricesPanel()}`;
  // live generation sparkline under each station card
  S.forEach((s,i)=>{const c=s.today_curve||[];
    if(c.some(p=>p.kw!=null)) sparkline('spark'+i,c.map(p=>p.t),c.map(p=>p.kw),stCol(s.status));});
  // fleet generation stacked by station (date-filtered)
  const per=S.map(s=>({s,a:agg(s,R)}));
  const allL=[...new Set(per.flatMap(p=>p.a.data.map(d=>d.label)))].sort();
  const sets=per.map((p,i)=>{const m=Object.fromEntries(p.a.data.map(d=>[d.label,d.pv]));
    return {l:short(nm(p.s)),d:allL.map(x=>m[x]??0),c:COLORS[i%COLORS.length]};});
  bars('oGen',allL.map(x=>lbl(x,R.gran)),sets,'кВт·год',true);
}
/* ---------- price editor (per-MWh tariff; shared via GitHub) ---------- */
function pricesPanel(){
  const rows=S.map((s,i)=>{const eff=(s.pr.custom&&s.pr.eur)?s.pr.eur:s.pr.def_eur; const disp=(s.display&&s.display!==s.name)?s.display:''; return `<tr>
    <td class="pd" style="white-space:normal;max-width:150px">${s.name}<div class="pdh">ідентифікатор</div></td>
    <td><input id="pnm${i}" type="text" maxlength="40" placeholder="${s.name}" value="${disp.replace(/"/g,'&quot;')}" style="width:160px"></td>
    <td><input id="pe${i}" type="number" min="0" step="1" inputmode="decimal" oninput="recalcUah(${i})" placeholder="${fmt(s.pr.def_eur,0)}" value="${s.pr.custom&&s.pr.eur?s.pr.eur:''}"> <small style="color:#94a3b8">€</small></td>
    <td class="pd"><span id="pu${i}">${fmt(Math.round(eff*FX),0)}</span> ₴<div class="pdh">= € × курс</div></td>
  </tr>`;}).join('');
  return `<details class="prices" ${PRICES_OPEN?'open':''} ontoggle="PRICES_OPEN=this.open">
    <summary>⚙️ Налаштування станцій — назва та тариф (€/МВт·год, гривня за курсом)</summary>
    <div class="pbody">
      <div class="prow"><label>Курс ₴ за 1 €</label><input id="fxin" type="number" min="0" step="0.1" inputmode="decimal" oninput="recalcAllUah()" value="${FX}" style="width:92px"></div>
      <div style="overflow-x:auto"><table class="ptbl"><thead><tr><th class="thd">Станція (ID)</th><th>Назва</th><th>Ціна €/МВт·год</th><th class="thd">₴/МВт·год (авто)</th></tr></thead><tbody>${rows}</tbody></table></div>
      <div class="pacts">
        <button class="rb on" onclick="applyPrices()">Застосувати (перегляд)</button>
        <button class="rb" onclick="savePrices()">💾 Зберегти для всіх (GitHub)</button>
        <button class="rb" onclick="resetPrices()">Скинути</button>
      </div>
      <div class="phint"><b>Назва</b> — як станція показується всюди (порожнє = ідентифікатор). <b>Ціна</b> — лише €/МВт·год, гривня рахується як <b>€ × курс</b>. <b>«Застосувати»</b> — перегляд лише у вашому браузері. <b>«Зберегти для всіх»</b> — відкриє GitHub, де зміни збережуться <b>назавжди і для всіх</b> (дашборд оновиться за ~1–2 хв; потрібен вхід у GitHub із доступом до репозиторію). Перемикач <b>€ / ₴</b> угорі змінює валюту доходу.</div>
    </div></details>`;
}
function recalcUah(i){
  const fx=parseFloat((document.getElementById('fxin')||{}).value)||FX;
  const e=parseFloat((document.getElementById('pe'+i)||{}).value);
  const eff=e>0?e:S[i].pr.def_eur;
  const span=document.getElementById('pu'+i); if(span)span.textContent=fmt(Math.round(eff*fx),0);
}
function recalcAllUah(){ S.forEach((s,i)=>recalcUah(i)); }
function applyPrices(){
  const fx=parseFloat((document.getElementById('fxin')||{}).value); if(fx>0)FX=fx;
  S.forEach((s,i)=>{
    const e=parseFloat((document.getElementById('pe'+i)||{}).value);
    s.pr.custom=e>0; s.pr.eur=e>0?e:null;
    const dn=((document.getElementById('pnm'+i)||{}).value||'').trim();
    s.display=dn||s.name;
  });
  PRICES_OPEN=true; updateFxNote(); renderNav(curView); rerender();
}
function resetPrices(){ S.forEach(s=>{s.pr.custom=false;s.pr.eur=null;s.display=s.name;}); PRICES_OPEN=true; renderNav(curView); rerender(); }
function savePrices(){
  const fx=parseFloat((document.getElementById('fxin')||{}).value)||FX;
  const stations={},names={};
  S.forEach((s,i)=>{
    const e=parseFloat((document.getElementById('pe'+i)||{}).value);
    if(e>0) stations[s.name]={eur_mwh:e};
    const dn=((document.getElementById('pnm'+i)||{}).value||'').trim();
    if(dn && dn!==s.name) names[s.name]=dn;
  });
  const obj={uah_per_eur:fx,stations,names};
  const body='Збереження тарифів для всіх станцій. Бот застосує автоматично — **не редагуйте** JSON нижче вручну.\n\n```json\n'+JSON.stringify(obj,null,2)+'\n```\n\nПісля натискання «Submit new issue» ціни збережуться і дашборд оновиться за ~2 хв.';
  const url='https://github.com/'+REPO+'/issues/new?labels=price&title='+encodeURIComponent('Оновлення тарифів станцій')+'&body='+encodeURIComponent(body);
  window.open(url,'_blank','noopener');
}
function scard(s,i){
  const c=stCol(s.status);
  const today=(s.today&&s.today.pv)||0;
  const month=(s.monthly||[]).find(x=>x.label===TODAY.slice(0,7))?.pv||0;
  const life=(s.yearly||[]).reduce((a,y)=>a+(y.pv||0),0);
  const hasCurve=(s.today_curve||[]).some(p=>p.kw!=null);
  return `<div class="scard" style="border-top-color:${c}" onclick="go(${i})">
    <div class="top"><div class="nm">${nm(s)} · ${cap(s)}</div><div class="badge" style="background:${c}">${stLbl(s.status)}</div></div>
    <div class="now">${fmt(s.now_kw,1)}<u> кВт зараз</u></div>
    <div class="mini">
      <div><div class="l">Сьогодні</div><div class="x">${cardE(today)}</div></div>
      <div><div class="l">Цей місяць</div><div class="x">${cardE(month)}</div></div>
      <div><div class="l">За весь час</div><div class="x">${cardE(life)}</div></div>
    </div>
    <div class="spark">${hasCurve?`<canvas id="spark${i}"></canvas>`:`<div class="nospark">немає даних сьогодні</div>`}</div>
  </div>`;
}

/* ---------- STATION ---------- */
function stationLive(s){
  const c=stCol(s.status);
  const mapUrl=(s.lat&&s.lon)?`https://www.google.com/maps?q=${s.lat},${s.lon}`:null;
  document.getElementById('view').innerHTML=`
    <div class="dhead">
      <div><div class="h1"><span style="width:13px;height:13px;border-radius:50%;background:${c};display:inline-block"></span>${nm(s)}
        <span style="font-size:15px;color:#94a3b8;font-weight:600">· ${cap(s)} встановлено</span></div>
        <div class="addr">📍 ${s.address||'—'}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span class="pill" style="color:${c}">● ${stLbl(s.status)}</span>
        <span class="pill">Система: Photomate</span>
        <span class="pill">Пристроїв: ${s.device_num||'—'}</span>
      </div>
    </div>
    <div class="note">ℹ️ Це станція системи <b>Photomate (NetEco)</b>. Показано дані наживо та підсумки за весь час. Детальна історія (графіки по днях/місяцях, як у станцій Brenvel) для цієї системи ще додається.</div>
    <div class="kpis">
      ${kpi('Потужність зараз',fmt(s.now_kw,1),'кВт')}
      ${kpi('Генерація сьогодні',fmt(s.today_kwh),'кВт·год',null,1)}
      ${kpi('Встановлено',fmt(s.nominal_kw),'кВт')}
      ${kpi('Завантаженість',s.nominal_kw?Math.round(s.now_kw/s.nominal_kw*100)+' %':'—','','зараз')}
      ${kpi('Всього вироблено',fmt(s.total_kwh/1e6,2),'ГВт·год')}
      ${kpi('Дохід за весь час',money(CUR==='₴'?(s.total_rev||0)*FX:(s.total_rev||0)),'')}
    </div>
    <h2 class="sec">Аварії</h2>
    <div class="panel"><div class="ok">✓ Немає активних аварій</div></div>`;
}
function station(i){
  clearCharts();
  const s=S[i];
  if(noHist(s)) return stationLive(s);
  const c=stCol(s.status), R=resolveRange(), a=agg(s,R), t=a.tot;
  const td=s.today||{}, peak=Math.max(0,...s.today_curve.map(p=>p.kw||0));
  const overlap=s.metered&&s.today_overlap&&s.today_overlap.some(p=>p.pv!=null||p.load!=null);
  const mapUrl=(s.lat&&s.lon)?`https://www.google.com/maps?q=${s.lat},${s.lon}`:null;
  const showRev=hasRev(s)||s.pr.custom;
  const periodInc=incomeOf(s,t.pv,t.rev);
  const epv=t.pv?money(Math.round(periodInc/(t.pv/1000)))+'/МВт·год':'—';
  const v=document.getElementById('view');
  v.innerHTML=`
    <div class="dhead">
      <div><div class="h1"><span style="width:13px;height:13px;border-radius:50%;background:${c};display:inline-block"></span>${nm(s)}
        <span style="font-size:15px;color:#94a3b8;font-weight:600">· ${cap(s)} встановлено</span></div>
        <div class="addr">📍 ${s.address||'—'}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span class="pill" style="color:${c}">● ${stLbl(s.status)}</span>
        ${s.metered?'<span class="pill" style="color:#16a34a">● з лічильником</span>':'<span class="pill">без лічильника</span>'}
        <span class="pill">Тариф: ${(s.price&&s.price.purchase)||'—'}</span>
        <span class="pill">Підключено ${s.connected||'—'}</span>
        ${mapUrl?`<a class="pill" href="${mapUrl}" target="_blank" rel="noopener">🗺 Карта</a>`:''}
      </div>
    </div>

    <h2 class="sec">Сьогодні наживо</h2>
    <div class="kpis">
      ${kpi('Потужність зараз',fmt(s.now_kw,1),'кВт')}
      ${kpi('Пік сьогодні',fmt(peak,1),'кВт')}
      ${kpi('Генерація сьогодні',fmt(td.pv),'кВт·год',null,1)}
      ${showRev?kpi('Дохід сьогодні',money(incomeOf(s,(s.today&&s.today.pv)||0,s.today_rev!=null?s.today_rev:((s.daily||[]).find(d=>d.label===TODAY)?.rev||0))),'',''):''}
      ${s.metered?kpi('Споживання',fmt(td.load),'кВт·год'):''}
      ${s.metered?kpi('Самоспоживання ПВ',td.self_cons!=null?fmt(td.self_cons,0):'—','%','генерації спожито на місці'):''}
      ${s.metered?kpi('Самозабезпечення',td.self_suff!=null?fmt(td.self_suff,0):'—','%','навантаження з ПВ'):''}
      ${s.metered?kpi('У мережу сьогодні',fmt(td.export),'кВт·год','надлишок'):''}
      ${s.metered?kpi('З мережі сьогодні',fmt(td.imp),'кВт·год','імпорт'):''}
    </div>
    <div class="panel full">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
        <div><h3>${overlap?'Генерація ПВ та споживання — сьогодні':'Потужність ПВ сьогодні'}</h3>
          <div class="sub">кВт · крок 5 хв · повний день, прогалини — немає даних</div></div>
        ${overlap?`<label style="font-size:13px;color:#475569;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap"><input type="checkbox" checked onchange="toggleLoad(this.checked)" style="width:16px;height:16px;cursor:pointer;accent-color:#64748b"> показувати споживання</label>`:''}
      </div>
      <div class="cwrap tall"><canvas id="dCurve"></canvas></div></div>

    <h2 class="sec">Аналіз за період</h2>
    ${rangeBar()}
    <div class="kpis">
      ${kpi('Генерація ПВ',fmt(t.pv),'кВт·год',R.title,1)}
      ${s.metered?kpi('Спожито всього',fmt(t.load),'кВт·год','навантаження'):''}
      ${s.metered?kpi('Самоспожито',fmt(t.selfuse),'кВт·год',t.pv?Math.round(t.selfuse/t.pv*100)+'% генерації':''):''}
      ${s.metered?kpi('Віддано в мережу',fmt(t.export),'кВт·год','надлишок ПВ'):''}
      ${s.metered?kpi('Куплено з мережі',fmt(t.imp),'кВт·год','імпорт'):''}
      ${s.metered?kpi('Самозабезпечення',t.load?Math.round(t.selfuse/t.load*100):'—','%','навантаження з ПВ'):''}
      ${showRev?kpi('Дохід',money(periodInc),'',R.title):kpi('Пристроїв',s.n_inverters||s.device_num||'—','')}
      ${showRev?kpi('Сер. ціна',epv,'',s.pr.custom?'ваша ціна':'дохід ÷ генерацію'):''}
    </div>
    ${!s.metered?`<div class="note">ℹ️ На цій станції не встановлено лічильник споживання — дані про навантаження, імпорт і експорт у мережу недоступні у FusionSolar. Показано генерацію та дохід.</div>`:''}
    <div class="charts">
      ${s.metered?`<div class="panel full"><h3>Генерація проти споживання</h3><div class="sub">${R.title} · кВт·год</div><div class="cwrap"><canvas id="dGenLoad"></canvas></div></div>`:
        `<div class="panel full"><h3>Генерація ПВ</h3><div class="sub">${R.title} · кВт·год</div><div class="cwrap"><canvas id="dGenLoad"></canvas></div></div>`}
      ${s.metered?`<div class="panel"><h3>Обмін з мережею</h3><div class="sub">імпорт vs експорт · кВт·год</div><div class="cwrap"><canvas id="dGrid"></canvas></div></div>`:''}
      ${showRev?`<div class="panel"><h3>Дохід</h3><div class="sub">${R.title} · ${CUR}</div><div class="cwrap"><canvas id="dRev"></canvas></div></div>`:''}
      ${s.metered?`<div class="panel"><h3>Куди пішла генерація</h3><div class="sub">самоспоживання vs експорт</div><div class="cwrap sm"><canvas id="dDoGen"></canvas></div></div>
      <div class="panel"><h3>Звідки спожито</h3><div class="sub">від ПВ vs з мережі</div><div class="cwrap sm"><canvas id="dDoUse"></canvas></div></div>`:''}
    </div>
    <h2 class="sec">Аварії</h2>
    <div class="panel">${(s.alarms&&s.alarms.length)?s.alarms.map(al=>`<div class="alert" style="margin:0 0 8px">⚠️ <b>${al.name}</b>${al.device?' — '+al.device:''}</div>`).join(''):'<div class="ok">✓ Немає активних аварій</div>'}</div>`;

  if(overlap)
    lines('dCurve',s.today_overlap.map(p=>p.t),[{l:'Генерація ПВ',d:s.today_overlap.map(p=>p.pv),c:'#16a34a'},{l:'Споживання',d:s.today_overlap.map(p=>p.load),c:'#64748b'}]);
  else if(s.today_curve.some(p=>p.kw!=null)) line('dCurve',s.today_curve.map(p=>p.t),s.today_curve.map(p=>p.kw),c);
  else noData('dCurve','Немає даних за сьогодні (станція офлайн)');
  const L=a.data.map(d=>lbl(d.label,R.gran));
  if(s.metered) bars('dGenLoad',L,[{l:'Генерація ПВ',d:a.data.map(d=>d.pv),c:C.pv},{l:'Споживання',d:a.data.map(d=>d.load),c:C.load}]);
  else bars('dGenLoad',L,[{l:'Генерація ПВ',d:a.data.map(d=>d.pv),c:C.pv}]);
  if(s.metered) bars('dGrid',L,[{l:'З мережі',d:a.data.map(d=>d.imp),c:C.imp},{l:'У мережу',d:a.data.map(d=>d.export),c:C.export}]);
  if(showRev) bars('dRev',L,[{l:'Дохід',d:a.data.map(d=>incomeOf(s,d.pv,d.rev)),c:C.rev}],CUR);
  if(s.metered){
    donut('dDoGen',['Самоспоживання','Експорт у мережу'],[t.selfuse||0,t.export||0],['#16a34a','#f59e0b']);
    donut('dDoUse',['Від ПВ','З мережі'],[t.selfuse||0,t.imp||0],['#16a34a','#ef4444']);
  }
}
function noData(id,msg){const c=document.getElementById(id);if(c)c.parentElement.innerHTML=`<div style="display:flex;height:100%;align-items:center;justify-content:center;color:#94a3b8;font-size:14px">${msg}</div>`;}
function toggleLoad(show){const ch=charts.find(c=>c.canvas&&c.canvas.id==='dCurve');if(ch){ch.setDatasetVisibility(1,show);ch.update();}}

/* ---------- nav ---------- */
function renderNav(active){
  const items=[['Огляд',-1],...S.map((s,i)=>[short(nm(s)),i])];
  document.getElementById('nav').innerHTML=items.map(([n,i])=>`<button class="tab ${active===i?'active':''}" onclick="go(${i})">${n}</button>`).join('');
}
function go(i){curView=i;renderNav(i);window.scrollTo({top:0,behavior:'smooth'});i<0?overview():station(i);}
function updateFxNote(){const el=document.getElementById('fxnote'); if(el)el.textContent='1 € = '+fmt(FX,FX%1?2:0)+' ₴';}
updateFxNote();
document.getElementById('upd').textContent='Оновлено '+DATA.updated;
document.getElementById('foot').innerHTML='Автоматично з FusionSolar + Photomate · '+DATA.updated+' ('+(DATA.tz||'')+')';
renderNav(-1); overview();
</script>
</body>
